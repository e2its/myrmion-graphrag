name: release-please

# Automatiza las releases desde commits convencionales (feat:/fix:/...).
# En cada push a main: actualiza/crea el "release PR" (release-pr) y, si un release PR se
# ha mergeado, publica el tag vX.Y.Z + la GitHub Release (github-release).
#
# Se ejecuta la CLI oficial con `npx` (Node viene preinstalado en ubuntu-latest) y SIN usar
# actions de marketplace (`uses:`), para no depender de la allowlist de Actions de la cuenta.

on:
  push:
    branches:
      - main

# Minimo privilegio: sin permisos por defecto; solo el job recibe lo justo.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # crear commits/tags/releases
      pull-requests: write    # abrir/actualizar el release PR
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: release-please (CLI oficial, sin actions de terceros)
        run: |
          set -e
          npx --yes release-please@16 release-pr \
            --token="$GITHUB_TOKEN" \
            --repo-url="${{ github.repository }}" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json
          npx --yes release-please@16 github-release \
            --token="$GITHUB_TOKEN" \
            --repo-url="${{ github.repository }}" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json
